<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body class="bg-slate-800 min-h-screen">
    <div class="mx-auto max-w-screen-xl gap-16 grid px-2 pb-16 mt-[180px] md:px-0 md:grid-cols-[1fr_2fr] md:mt-[200px] lg:mt-[220px]">
      <div>
        {% include infobar.html %}
      </div>

      <div class="space-y-8 md:space-y-12 xl:space-y-16">
        <a id="content"></a>
        <div class="bg-slate-900 text-white rounded-md border border-slate-600 p-8 relative">
          {{ content }}
        </div>

        {% if page.show_posts %}
          <div class="bg-slate-900 text-white rounded-md border border-slate-600 p-8 relative">
            <div class="prose prose-invert mb-4">
              <h2>Posts</h2>
            </div>
            <ul class="grid gap-12">
              {% for post in site.posts %}
                <li class="space-y-2">
                  <div class="grid md:flex md:gap-4 md:items-start md:justify-between">
                    <h3 class="text-xl font-semibold flex-1">
                      <a href="{{ post.url }}#content">{{ post.title }}</a>
                    </h3>
                    <time class="text-gray-300" datetime="{{ post.date }}">
                      {{ post.date | date: "%B %d, %Y" }}
                    </time>
                  </div>
                  <p class="text-lg text-gray-200">{{ post.description }}</p>
                </li>
              {% endfor %}
            </ul>
          </div>
        {% endif %}
      </div>
    </div>

    <script src="https://tp.michaeljcoyne.me/tp.js" data-property-id="FCCDGQBC" data-server="https://tp.michaeljcoyne.me"></script>
  </body>
</html>
